<!DOCTYPE html> <!-- Báo cho trình duyệt biết đây là HTML5 -->
<html lang="en"> <!-- Bọc cả trang. Vẫn để en vì giao diện trang này đang dùng tiếng Anh -->
<head> <!-- Phần cấu hình của trang -->
  <meta charset="UTF-8"> <!-- Dùng UTF-8 để chữ hiện ra không bị lỗi -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Giúp trang này lên điện thoại vẫn nhìn ổn -->
  <title>Forgot Password</title> <!-- Tên trang trên tab -->
  <link rel="stylesheet" href="../assets/css/base.css"> <!-- File CSS dùng chung. Có `../` vì file này đang nằm trong thư mục auth -->
  <link rel="stylesheet" href="../assets/css/auth.css"> <!-- File CSS riêng cho mấy trang đăng nhập, quên mật khẩu, tạo tài khoản -->
</head> <!-- Đóng phần head -->
<body> <!-- Bắt đầu phần nội dung hiển thị -->
  <main class="login-page"> <!-- Vẫn dùng khung này để tận dụng cách căn giữa có sẵn -->
    <section class="login-card"> <!-- Dùng cùng kiểu card với trang login cho đồng bộ -->
      <p class="eyebrow">Account help</p> <!-- Dòng phụ nhỏ ở trên -->
      <h1>Forgot password</h1> <!-- Tiêu đề chính của trang -->
      <p class="subtitle">Enter your email address and we will send you a reset link.</p> <!-- Dòng hướng dẫn ngắn để người dùng biết phải làm gì -->

      <form class="login-form"> <!-- Vẫn là form vì người dùng cần nhập email rồi gửi đi -->
        <label for="reset-email">Email</label> <!-- Label này nối với ô input bên dưới -->
        <input id="reset-email" type="email" placeholder="you@example.com" required> <!-- Dùng email vì đây đúng là ô email. Required để trống thì không gửi được -->

        <button type="submit">Send reset link</button> <!-- Nút này dùng để gửi form -->
      </form> <!-- Đóng form -->

      <p class="signup-text">Remembered your password? <a href="../index.html">Back to login</a></p> <!-- Nếu nhớ lại mật khẩu rồi thì bấm link này để quay về login -->
    </section> <!-- Đóng card -->
  </main> <!-- Đóng phần chính -->
</body> <!-- Đóng body -->
</html> <!-- Kết thúc file HTML -->
